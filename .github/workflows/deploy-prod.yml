name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirmation_message:
        description: "Confirmation message for production deployment"
        required: false
        default: "Production deployment initiated"

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Full Test Suite

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pipenv
        run: pip install pipenv

      - name: Install backend dependencies
        run: pipenv install --dev

      - name: Run backend unit tests
        run: pipenv run pytest backend/tests/ -v --ignore=backend/tests/integration --ignore=backend/tests/smoke --cov=backend --cov-report=xml

      - name: Run backend integration tests
        run: pipenv run pytest backend/tests/integration/ -v

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend linting
        working-directory: frontend
        run: npm run lint

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend E2E tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-prod
          path: frontend/playwright-report/
          retention-days: 30

  deploy-backend-prod:
    runs-on: ubuntu-latest
    needs: test
    environment: production

    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        lambda-name:
          - meals
          - meal_logs
          - summary
          - users
          - daily_summaries_batch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pipenv
        run: pip install pipenv

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build Lambda package (${{ matrix.lambda-name }})
        run: |
          set -e

          SRC_DIR=backend/lambdas/${{ matrix.lambda-name }}
          BUILD_DIR=build/${{ matrix.lambda-name }}

          mkdir -p $BUILD_DIR/backend/shared
          mkdir -p $BUILD_DIR/backend/lambdas/${{ matrix.lambda-name }}

          # Copy shared modules
          cp backend/shared/*.py $BUILD_DIR/backend/shared/
          touch $BUILD_DIR/backend/__init__.py
          touch $BUILD_DIR/backend/shared/__init__.py
          touch $BUILD_DIR/backend/lambdas/__init__.py

          # Copy Lambda source
          cp -R $SRC_DIR/* $BUILD_DIR/backend/lambdas/${{ matrix.lambda-name }}/
          touch $BUILD_DIR/backend/lambdas/${{ matrix.lambda-name }}/__init__.py

          # Install dependencies from Pipfile
          PIPENV_PIPFILE=backend/Pipfile pipenv requirements > requirements.txt
          pip install -r requirements.txt --target $BUILD_DIR

      - name: Deploy Lambda (${{ matrix.lambda-name }}) to Production
        uses: aws-actions/aws-lambda-deploy@v1
        with:
          function-name: diet-tracker-${{ matrix.lambda-name }}
          code-artifacts-dir: build/${{ matrix.lambda-name }}
          runtime: python3.12
          handler: backend.lambdas.${{ matrix.lambda-name }}.handler.handler
          role: arn:aws:iam::024680432439:role/diet-tracker-execution-role
          timeout: 30
          environment: >-
            {"DB_SECRET_ARN":"${{ secrets.DB_SECRET_ARN }}","DB_NAME":"${{ secrets.DB_NAME }}","ALLOWED_ORIGIN":"${{ secrets.ALLOWED_ORIGIN }}"}

  deploy-frontend-prod:
    runs-on: ubuntu-latest
    needs: test
    environment: production

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_COGNITO_DOMAIN: ${{ secrets.VITE_COGNITO_DOMAIN }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REDIRECT_URI: ${{ secrets.VITE_COGNITO_REDIRECT_URI }}
          VITE_COGNITO_LOGOUT_URI: ${{ secrets.VITE_COGNITO_LOGOUT_URI }}
          VITE_COGNITO_SCOPES: ${{ secrets.VITE_COGNITO_SCOPES }}
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3 (Production)
        run: aws s3 sync frontend/dist "s3://${{ secrets.S3_BUCKET_NAME }}" --delete

      - name: Invalidate CloudFront cache (Production)
        run: |
          if [ -n "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
              --paths "/index.html"
          else
            echo "CLOUDFRONT_DISTRIBUTION_ID not set; skipping invalidation."
          fi
